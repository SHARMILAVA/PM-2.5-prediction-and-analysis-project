<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PM2.5 Estimation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <main class="login-shell">
        <section class="login-card">
            <div class="login-brand">
                <span class="brand-chip"><i class="fas fa-wind"></i> PM2.5</span>
                <h1>Secure Access</h1>
                <p>Sign in to continue to the PM2.5 estimation dashboard.</p>
            </div>

            {% if error %}
            <div class="login-error">
                <i class="fas fa-circle-exclamation"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" class="login-form" autocomplete="off">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="admin@gmail.com" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>

                <button type="submit" class="btn-primary login-btn">Login</button>
            </form>
        </section>
    </main>
</body>
</html>
